<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A modern, secure password generator with strength analysis — built for digital heroes by Naina." />
  <title>SecurePass — Password Generator by Naina</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== BACKGROUND BLOBS ========== -->
  <div class="bg-blob blob-1" aria-hidden="true"></div>
  <div class="bg-blob blob-2" aria-hidden="true"></div>
  <div class="bg-blob blob-3" aria-hidden="true"></div>

  <!-- ========== MAIN WRAPPER ========== -->
  <main class="wrapper" role="main">

    <!-- ---- HEADER ---- -->
    <header class="card-header">
      <div class="logo" aria-label="SecurePass Logo">
        <svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1 class="app-title">SecurePass</h1>
      <p class="app-subtitle">Generate strong, unbreakable passwords in seconds</p>
    </header>

    <!-- ---- CARD ---- -->
    <section class="card" aria-label="Password Generator">

      <!-- Password Display Box -->
      <div class="password-box" id="passwordBox" aria-label="Generated password display area">
        <span class="password-text" id="passwordDisplay" aria-live="polite" aria-atomic="true">
          Click "Generate" to create your password
        </span>
        <button class="copy-btn" id="copyBtn" title="Copy to clipboard" aria-label="Copy password to clipboard" disabled>
          <!-- Copy Icon -->
          <svg class="icon icon-copy" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <!-- Check Icon (shown on copy success) -->
          <svg class="icon icon-check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </button>
      </div>

      <!-- Strength Indicator -->
      <div class="strength-section" aria-label="Password strength indicator">
        <div class="strength-label-row">
          <span class="strength-label-text">Strength</span>
          <span class="strength-name" id="strengthName" aria-live="polite">—</span>
        </div>
        <div class="strength-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="4" aria-label="Password strength bar">
          <div class="strength-segment" id="seg1"></div>
          <div class="strength-segment" id="seg2"></div>
          <div class="strength-segment" id="seg3"></div>
          <div class="strength-segment" id="seg4"></div>
        </div>
      </div>

      <!-- ---- CONTROLS ---- -->
      <div class="controls">

        <!-- Length Slider -->
        <div class="control-group">
          <div class="control-label-row">
            <label class="control-label" for="lengthSlider">Password Length</label>
            <span class="length-value" id="lengthValue" aria-live="polite">16</span>
          </div>
          <div class="slider-wrapper">
            <input
              type="range"
              id="lengthSlider"
              class="slider"
              min="8"
              max="32"
              value="16"
              step="1"
              aria-label="Password length slider, range 8 to 32"
            />
            <div class="slider-track-fill" id="sliderFill"></div>
          </div>
          <div class="slider-limits" aria-hidden="true">
            <span>8</span>
            <span>32</span>
          </div>
        </div>

        <!-- Character Type Checkboxes -->
        <div class="control-group">
          <p class="control-label">Character Types</p>
          <div class="checkbox-grid">

            <label class="checkbox-card" for="includeUpper" id="label-upper">
              <input type="checkbox" id="includeUpper" class="checkbox-input" checked aria-label="Include uppercase letters" />
              <span class="checkbox-custom" aria-hidden="true"></span>
              <span class="checkbox-info">
                <span class="checkbox-title">Uppercase</span>
                <span class="checkbox-sample">A–Z</span>
              </span>
            </label>

            <label class="checkbox-card" for="includeLower" id="label-lower">
              <input type="checkbox" id="includeLower" class="checkbox-input" checked aria-label="Include lowercase letters" />
              <span class="checkbox-custom" aria-hidden="true"></span>
              <span class="checkbox-info">
                <span class="checkbox-title">Lowercase</span>
                <span class="checkbox-sample">a–z</span>
              </span>
            </label>

            <label class="checkbox-card" for="includeNumbers" id="label-numbers">
              <input type="checkbox" id="includeNumbers" class="checkbox-input" checked aria-label="Include numbers" />
              <span class="checkbox-custom" aria-hidden="true"></span>
              <span class="checkbox-info">
                <span class="checkbox-title">Numbers</span>
                <span class="checkbox-sample">0–9</span>
              </span>
            </label>

            <label class="checkbox-card" for="includeSymbols" id="label-symbols">
              <input type="checkbox" id="includeSymbols" class="checkbox-input" aria-label="Include symbols" />
              <span class="checkbox-custom" aria-hidden="true"></span>
              <span class="checkbox-info">
                <span class="checkbox-title">Symbols</span>
                <span class="checkbox-sample">!@#$</span>
              </span>
            </label>

          </div>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
          <button class="btn btn-generate" id="generateBtn" aria-label="Generate a new password">
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
              aria-hidden="true">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
            Generate Password
          </button>

          <button class="btn btn-copy-main" id="copyBtnMain" aria-label="Copy password to clipboard" disabled>
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
              aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            Copy to Clipboard
          </button>
        </div>

        <!-- Toast Notification -->
        <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true">
          ✓ Password copied to clipboard!
        </div>

      </div><!-- /controls -->
    </section><!-- /card -->

    <!-- ---- FOOTER ---- -->
    <footer class="footer" aria-label="Footer information">
      <div class="footer-info">
        <p class="footer-name">Naina</p>
        <a class="footer-email" href="mailto:raghuvanshinaina06@gmail.com" aria-label="Email Naina">
          raghuvanshinaina06@gmail.com
        </a>
      </div>
      <a
        class="hero-btn"
        href="https://digitalheroesco.com"
        target="_blank"
        rel="noopener noreferrer"
        id="heroBtn"
        aria-label="Built for Digital Heroes - visit digitalheroesco.com"
      >
        <svg class="hero-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          aria-hidden="true">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
        Built for Digital Heroes
      </a>
    </footer>

  </main><!-- /wrapper -->

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
